services:
  app:
    image: modulotechgroup/gitlabsprintmanager:dev
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    depends_on:
      - database
      - redis
    volumes:
      - ..:/rails
    environment:
      RAILS_ENV: development
      URL: http://localhost:3000
    env_file:
      - path: .env
        required: false
    stdin_open: true
    tty: true

  database:
    image: postgres:16-alpine
    volumes:
      - db_data:/var/lib/postgresql/data
    expose:
      - '5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gitlabsprintmanager
      LC_COLLATE: 'en_US.UTF-8'
      LC_CTYPE: 'en_US.UTF-8'

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data

  mailcatcher:
    image: dockage/mailcatcher
    expose:
      - '1080'
      - '1025'


volumes:
  db_data:
  redis_data:
